<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Résultat de la Détection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='result.css') }}">
</head>
<body class="recognition-page">
    <div class="container">
{#    <button onclick="window.history.back()" class="back-button">← Retour</button>#}
{#    <a href="{{ url_for('index') }}" class="back-link">← Retour</a>#}
        <h1>🧐 Résultat de la Détection</h1>
        <p><strong>Résultat :</strong> {{ label }}</p>
        <p><strong>Confiance :</strong> {{ confidence }}%</p>

        {% if file_path %}
            <div class="image-wrapper1">
                <img src="{{ url_for('static', filename=file_path) }}" alt="Uploaded Image">
            </div>
        {% endif %}


        <!-- Bouton pour générer une image adversariale -->
        {% if file_path and request.args.get('source') == 'deepfake'  %}
            <form action="{{ url_for('adversarial_from_result') }}" method="GET" style="display: inline;">
                <input type="hidden" name="file_path" value="{{ file_path }}">
                <button type="submit" style="margin-top:10px;">Générer Adversarial ⚡</button>
            </form>
        {% endif %}


        {%if file_path and request.args.get('source') == 'adversarial' %}
  <form action="{{ url_for('defense_from_result') }}" method="GET" style="display: inline;">
    <input type="hidden" name="file_path" value="{{ file_path }}">
    <button type="submit" style="margin-top:10px;">Analyser avec Défense 🛡️</button>
  </form>
{% endif %}

        <button onclick="resetUpload()" style="margin-top:10px;">Nouvelle analyse🔍 </button>

    <script>
         // Fonction pour rediriger vers la page de nouvelle analyse
        function resetUpload() {
            window.location.href = "{{ url_for('deepfake_detection') }}";
        }

        // Fonction pour rediriger vers la génération d'image adversariale
        function generateAdversarial(filePath) {
            window.location.href = "{{ url_for('adversarial_from_result') }}?file_path=" + filePath;
        }
    </script>

    </div>
</body>
</html>
