<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résultat de la Détection Défensive</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='result.css') }}">
</head>
<body class="recognition-page">
  <div class="container">
    <h1>🛡️ Résultat du modèle de défense</h1>

    <p><strong>Résultat :</strong> {{ label }}</p>
    <p><strong>Confiance :</strong> {{ confidence }}%</p>

    {% if file_path %}
    <div class="image-wrapper1">

      <img src="{{ url_for('static', filename=file_path) }}" alt="Image analysée">
    </div>
    {% endif %}

    <a class="new-analysis" href="{{ url_for('defense') }}">🔁 Nouvelle analyse</a>
     {% if source == 'adversarial' %}
            <a href="{{ url_for('result_adversarial', original=request.args.get('original'), adversarial=file_path) }}"
               class="btn btn-back">
               ↩ Retour aux résultats adversariaux
            </a>
            {% endif %}

  </div>

</body>
</html>
